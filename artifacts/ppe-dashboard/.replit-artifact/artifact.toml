kind = "web"
previewPath = "/"
title = "Video Analytics - PPE Compliance"
version = "1.0.0"
id = "artifacts/ppe-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25994
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ppe-dashboard run dev"

[services.env]
PORT = "25994"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ppe-dashboard", "run", "build"]
publicDir = "artifacts/ppe-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
